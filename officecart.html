<!DOCTYPE html>
<html>
<head>
<title>Office Cart</title>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f3f6;
    margin: 0;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:white;
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;}

.contact-btn {
    background:#6c8f2e;
    color:white;
    padding:10px 16px;
    border-radius:6px;
}

/* TITLE */
.page-title {
    background:#2874f0;
    color:white;
    text-align:center;
    padding:12px;
}

/* MAIN LAYOUT */
.container {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    padding:20px;
}

/* LEFT ITEMS */
.cart-items {
    background:white;
    border-radius:10px;
    padding:20px;
}

/* ITEM */
.item {
    display:flex;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

/* IMAGE */
.item img {
    width:80px;
    height:80px;
    object-fit:contain;
}

/* DETAILS */
.details {
    flex:1;
}

.details h4 {
    margin:0;
}

.price {
    color:#2874f0;
    font-weight:bold;
    margin-top:5px;
}

/* QTY */
.qty {
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
}

.qty button {
    padding:5px 10px;
    border:none;
    background:#2874f0;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

/* REMOVE */
.remove {
    color:red;
    font-size:13px;
    cursor:pointer;
    margin-top:5px;
}

/* RIGHT SUMMARY */
.summary {
    background:white;
    border-radius:10px;
    padding:20px;
    height:fit-content;
}

/* SUMMARY TEXT */
.summary h3 {
    margin-top:0;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total {
    font-weight:bold;
    font-size:18px;
    margin-top:10px;
}

/* BUTTON */
.checkout {
    width:100%;
    padding:12px;
    background:#fb641b;
    color:white;
    border:none;
    border-radius:5px;
    margin-top:15px;
    cursor:pointer;
}

/* BACK */
.back {
    margin-top:10px;
    display:block;
    text-align:center;
    text-decoration:none;
    color:#2874f0;
}

/* MOBILE */
@media(max-width:768px){
    .container {
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo"><img src="logo.png"></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>

<div class="contact-btn">📞 +91 9886887482</div>
</div>

<div class="page-title">Shopping Cart</div>

<div class="container">

<!-- LEFT -->
<div class="cart-items" id="items"></div>

<!-- RIGHT -->
<div class="summary" id="summary"></div>

</div>

<script>

const cartKey = "officecart";

/* LOAD CART */
function loadCart(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let itemsHTML = "";
let total = 0;

if(cart.length === 0){
document.getElementById("items").innerHTML = "<p>Your cart is empty</p>";
document.getElementById("summary").innerHTML = "";
return;
}

cart.forEach((item,i)=>{

let sub = item.price * item.qty;
total += sub;

itemsHTML += `
<div class="item">

<img src="https://via.placeholder.com/80">

<div class="details">
<h4>${item.name}</h4>
<div class="price">₹${item.price}</div>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

<div class="remove" onclick="deleteItem(${i})">Remove</div>
</div>

<div class="price">₹${sub}</div>

</div>
`;
});

document.getElementById("items").innerHTML = itemsHTML;

/* SUMMARY */
document.getElementById("summary").innerHTML = `
<h3>Order Summary</h3>

<div class="row"><span>Subtotal</span><span>₹${total}</span></div>
<div class="row"><span>GST (18%)</span><span>₹${Math.round(total*0.18)}</span></div>

<div class="row total">
<span>Total</span>
<span>₹${total + Math.round(total*0.18)}</span>
</div>

<button class="checkout" onclick="sendWhatsApp()">Checkout</button>

<a href="office.html" class="back">← Continue Shopping</a>
`;
}

/* QTY */
function changeQty(i,change){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

cart[i].qty += change;

if(cart[i].qty<=0) cart.splice(i,1);

localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

/* DELETE */
function deleteItem(i){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

/* WHATSAPP */
function sendWhatsApp(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let msg = "Order:%0A";
let total = 0;

cart.forEach(item=>{
let sub = item.price * item.qty;
total += sub;
msg += `${item.name} - ${item.qty} x ₹${item.price} = ₹${sub}%0A`;
});

msg += `%0ATotal ₹${total}`;

window.open(`https://wa.me/919886887482?text=${msg}`);
}

loadCart();

</script>

</body>
</html>
