<!DOCTYPE html>
<html>
<head>
<title>Office Cart</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f3f6;
    margin: 0;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:white;
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;}

.contact-btn {
    background:#6c8f2e;
    color:white;
    padding:10px 16px;
    border-radius:6px;
}

/* TITLE */
.page-title {
    background:#2874f0;
    color:white;
    text-align:center;
    padding:12px;
}

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

.container.empty-mode {
    grid-template-columns:1fr;
}

/* LEFT */
.cart-items {
    background:white;
    border-radius:12px;
    padding:20px;
}

/* ===== FLIPKART ITEM ===== */
.item {
    display:grid;
    grid-template-columns:100px 1fr 120px 120px;
    align-items:center;
    gap:15px;
    padding:20px 0;
    border-bottom:1px solid #eee;
}

/* IMAGE */
.item-img img {
    width:90px;
    height:90px;
    object-fit:contain;
}

/* DETAILS */
.item-details h4 {
    margin:0;
    font-size:16px;
}

.desc {
    font-size:13px;
    color:#777;
    margin:5px 0;
}

/* REMOVE */
.remove {
    font-size:13px;
    color:#2874f0;
    cursor:pointer;
    font-weight:500;
}

/* QTY */
.item-qty {
    display:flex;
    align-items:center;
    gap:10px;
}

.item-qty button {
    width:28px;
    height:28px;
    border-radius:50%;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
}

/* PRICE */
.item-price {
    text-align:right;
}

.item-price p {
    margin:0;
    font-weight:bold;
}

.item-price span {
    color:#388e3c;
    font-size:14px;
}

/* ===== SUMMARY ===== */
.summary {
    background:white;
    border-radius:12px;
    padding:20px;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total {
    font-weight:bold;
    font-size:18px;
}

.checkout {
    width:100%;
    padding:12px;
    background:#fb641b;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:10px;
    cursor:pointer;
}

.clear-btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#999;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.back {
    display:block;
    margin-top:10px;
    text-align:center;
    color:#2874f0;
    text-decoration:none;
}

/* ===== EMPTY CART ===== */
.empty-wrapper {
    text-align:center;
    padding:50px;
}

.empty-card img {
    width:120px;
}

.shop-btn {
    padding:12px 25px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:8px;
}

/* ===== RECOMMENDED ===== */
.recommend {
    margin-top:40px;
}

.recommend-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.re-card {
    background:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.re-card img {
    height:100px;
}

.re-card button {
    margin-top:10px;
    padding:8px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:6px;
}

/* MOBILE */
@media(max-width:768px){
.container {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo"><img src="logo.png"></div>
<div class="menu">
<a href="#">Home</a>
<a href="index.html#services">Services</a>
<a href="#">Contact</a>
</div>
<div class="contact-btn">📞 +91 9886887482</div>
</div>

<div class="page-title">Shopping Cart</div>

<div class="container" id="container">
<div class="cart-items" id="items"></div>
<div class="summary" id="summary"></div>
</div>

<script>

const cartKey = "officecart";

/* RECOMMENDED */
const recommended = [
{name:"A4 Paper", price:120},
{name:"Stapler", price:250},
{name:"Notebook", price:150},
{name:"Pen Set", price:90}
];

/* LOAD */
function loadCart(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let container = document.getElementById("container");

/* EMPTY */
if(cart.length === 0){

container.classList.add("empty-mode");

document.getElementById("items").innerHTML = `
<div class="empty-wrapper">
<img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png">
<h2>Your cart is empty</h2>
<p>Add items to get started</p>
<a href="office.html">
<button class="shop-btn">← Continue Shopping</button>
</a>

<div class="recommend">
<h3>Recommended Products</h3>
<div class="recommend-grid">
${recommended.map(p=>`
<div class="re-card">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`).join("")}
</div>
</div>
</div>
`;

document.getElementById("summary").style.display="none";
return;
}

/* NORMAL */
container.classList.remove("empty-mode");
document.getElementById("summary").style.display="block";

let itemsHTML="";
let total=0;

cart.forEach((item,i)=>{
let sub=item.price*item.qty;
total+=sub;

itemsHTML+=`
<div class="item">

<div class="item-img">
<img src="https://via.placeholder.com/90">
</div>

<div class="item-details">
<h4>${item.name}</h4>
<p class="desc">Office Product</p>
<span class="remove" onclick="deleteItem(${i})">REMOVE</span>
</div>

<div class="item-qty">
<button onclick="changeQty(${i},-1)">−</button>
<span>${item.qty}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

<div class="item-price">
<p>₹${item.price}</p>
<span>₹${sub}</span>
</div>

</div>
`;
});

document.getElementById("items").innerHTML=itemsHTML;

/* SUMMARY */
let gst=Math.round(total*0.18);

document.getElementById("summary").innerHTML=`
<h3>Price Details</h3>
<div class="row"><span>Subtotal</span><span>₹${total}</span></div>
<div class="row"><span>GST</span><span>₹${gst}</span></div>
<div class="row total"><span>Total</span><span>₹${total+gst}</span></div>

<button class="checkout">Checkout</button>
<button class="clear-btn" onclick="clearCart()">Clear Cart</button>
<a href="office.html" class="back">← Continue Shopping</a>
`;
}

/* FUNCTIONS */
function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
let f=cart.find(i=>i.name===name);
if(f) f.qty++;
else cart.push({name,price,qty:1});
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

function changeQty(i,c){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
cart[i].qty+=c;
if(cart[i].qty<=0) cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

function deleteItem(i){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

function clearCart(){
localStorage.removeItem(cartKey);
loadCart();
}

loadCart();

</script>

</body>
</html>
