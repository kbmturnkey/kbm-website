<!DOCTYPE html>
<html>
<head>
<title>Office Cart</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e9eef5, #dce3ec);
    margin: 0;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:white;
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;}

.contact-btn {
    background:#6c8f2e;
    color:white;
    padding:10px 16px;
    border-radius:6px;
}

/* TITLE */
.page-title {
    background:#2874f0;
    color:white;
    text-align:center;
    padding:12px;
}

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    padding:20px;
}

/* LEFT */
.cart-items {
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* ITEM */
.item {
    display:flex;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.item img {
    width:80px;
    height:80px;
    object-fit:contain;
}

.details {flex:1;}

.price {
    color:#2874f0;
    font-weight:bold;
}

/* QTY */
.qty {
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
}

.qty button {
    padding:5px 10px;
    border:none;
    background:#2874f0;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

/* REMOVE */
.remove {
    color:red;
    font-size:13px;
    cursor:pointer;
    margin-top:5px;
}

/* RIGHT SUMMARY */
.summary {
    background:white;
    border-radius:12px;
    padding:20px;
    height:fit-content;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.summary h3 {margin-top:0;}

.row {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total {
    font-weight:bold;
    font-size:18px;
    margin-top:10px;
}

/* BUTTONS */
.checkout {
    width:100%;
    padding:12px;
    background:#fb641b;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:15px;
    cursor:pointer;
}

.clear-btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#999;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.back {
    display:block;
    margin-top:10px;
    text-align:center;
    color:#2874f0;
    text-decoration:none;
}

/* ===== ULTRA PREMIUM EMPTY CART ===== */

.empty-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    height:75vh;
}

.empty-card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.7);
    border-radius:20px;
    padding:50px 30px;
    text-align:center;
    width:350px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    animation: fadeInUp 0.6s ease;
}

/* FLOAT ICON */
.icon img {
    width:120px;
    margin-bottom:20px;
    animation: float 3s ease-in-out infinite;
}

/* TEXT */
.empty-card h2 {
    margin:10px 0;
    font-size:22px;
}

.empty-card p {
    color:#666;
    margin-bottom:25px;
}

/* BUTTON */
.shop-btn {
    padding:12px 26px;
    background: linear-gradient(135deg,#2874f0,#1e4db7);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.shop-btn:hover {
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(40,116,240,0.3);
}

/* SHINE */
.shop-btn::after {
    content:"";
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transform:skewX(-20deg);
}

.shop-btn:hover::after {
    animation:shine 1s;
}

/* ANIMATION */
@keyframes float {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
}

@keyframes fadeInUp {
    from {opacity:0;transform:translateY(30px);}
    to {opacity:1;transform:translateY(0);}
}

@keyframes shine {
    100% {left:125%;}
}

/* MOBILE */
@media(max-width:768px){
    .container {grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo"><img src="logo.png"></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>

<div class="contact-btn">📞 +91 9886887482</div>
</div>

<div class="page-title">Shopping Cart</div>

<div class="container">

<div class="cart-items" id="items"></div>
<div class="summary" id="summary"></div>

</div>

<script>

const cartKey = "officecart";

/* LOAD CART */
function loadCart(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let itemsHTML = "";
let total = 0;

/* EMPTY CART */
if(cart.length === 0){
document.getElementById("items").innerHTML = `
<div class="empty-wrapper">
    <div class="empty-card">
        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png">
        </div>
        <h2>Your cart is empty</h2>
        <p>Start adding items to build your order</p>
        <a href="office.html">
            <button class="shop-btn">← Continue Shopping</button>
        </a>
    </div>
</div>
`;

document.getElementById("summary").innerHTML = "";
return;
}

/* ITEMS */
cart.forEach((item,i)=>{

let sub = item.price * item.qty;
total += sub;

itemsHTML += `
<div class="item">
<img src="https://via.placeholder.com/80">

<div class="details">
<h4>${item.name}</h4>
<div class="price">₹${item.price}</div>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

<div class="remove" onclick="deleteItem(${i})">Remove</div>
</div>

<div class="price">₹${sub}</div>
</div>
`;
});

document.getElementById("items").innerHTML = itemsHTML;

/* SUMMARY */
let gst = Math.round(total * 0.18);
let grandTotal = total + gst;

document.getElementById("summary").innerHTML = `
<h3>Order Summary</h3>

<div class="row"><span>Subtotal</span><span>₹${total}</span></div>
<div class="row"><span>GST (18%)</span><span>₹${gst}</span></div>

<div class="row total">
<span>Total</span>
<span>₹${grandTotal}</span>
</div>

<button class="checkout" onclick="sendWhatsApp()">Checkout</button>
<button class="clear-btn" onclick="clearCart()">Clear Cart</button>
<a href="office.html" class="back">← Continue Shopping</a>
`;
}

/* FUNCTIONS */
function changeQty(i,change){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
cart[i].qty += change;
if(cart[i].qty<=0) cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

function deleteItem(i){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

function clearCart(){
if(confirm("Clear cart?")){
localStorage.removeItem(cartKey);
loadCart();
}
}

function sendWhatsApp(){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let msg="Order:%0A";
let total=0;

cart.forEach(item=>{
let sub=item.price*item.qty;
total+=sub;
msg+=`${item.name} - ${item.qty} x ₹${item.price} = ₹${sub}%0A`;
});

msg+=`%0ATotal ₹${total}`;
window.open(`https://wa.me/919886887482?text=${msg}`);
}

loadCart();

</script>

</body>
</html>
