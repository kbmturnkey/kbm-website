<!DOCTYPE html>
<html>
<head>
<title>Office Cart</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dde4ee);
    margin: 0;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:white;
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;}

.contact-btn {
    background:#6c8f2e;
    color:white;
    padding:10px 16px;
    border-radius:6px;
}

/* TITLE */
.page-title {
    background:#2874f0;
    color:white;
    text-align:center;
    padding:12px;
}

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

/* EMPTY MODE */
.container.empty-mode {
    grid-template-columns:1fr;
}

/* LEFT */
.cart-items {
    background:white;
    border-radius:12px;
    padding:20px;
}

/* ITEM */
.item {
    display:flex;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.item img {
    width:80px;
    height:80px;
    object-fit:contain;
}

.details {flex:1;}

.price {
    color:#2874f0;
    font-weight:bold;
}

/* QTY */
.qty {
    display:flex;
    gap:8px;
    margin-top:10px;
}

.qty button {
    padding:5px 10px;
    border:none;
    background:#2874f0;
    color:white;
    border-radius:4px;
}

/* REMOVE */
.remove {
    color:red;
    font-size:13px;
    cursor:pointer;
}

/* SUMMARY */
.summary {
    background:white;
    border-radius:12px;
    padding:20px;
}

/* EMPTY CART */
.empty-wrapper {
    text-align:center;
    padding:50px;
}

.empty-card img {
    width:120px;
}

/* BUTTON */
.shop-btn {
    padding:12px 25px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* RECOMMENDED */
.recommend {
    margin-top:40px;
}

.recommend h3 {
    margin-bottom:15px;
}

.recommend-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.re-card {
    background:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.re-card img {
    height:100px;
    object-fit:contain;
}

.re-card button {
    margin-top:10px;
    padding:8px 12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo"><img src="logo.png"></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>
<div class="contact-btn">📞 +91 9886887482</div>
</div>

<div class="page-title">Shopping Cart</div>

<div class="container" id="container">
<div class="cart-items" id="items"></div>
<div class="summary" id="summary"></div>
</div>

<script>

const cartKey = "officecart";

/* SAMPLE RECOMMENDED PRODUCTS */
const recommended = [
{name:"A4 Paper", price:120, img:"https://via.placeholder.com/100"},
{name:"Ball Pen", price:50, img:"https://via.placeholder.com/100"},
{name:"Stapler", price:200, img:"https://via.placeholder.com/100"},
{name:"Notebook", price:150, img:"https://via.placeholder.com/100"},
{name:"Marker", price:80, img:"https://via.placeholder.com/100"}
];

/* LOAD CART */
function loadCart(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let container = document.getElementById("container");

/* EMPTY CART */
if(cart.length === 0){

container.classList.add("empty-mode");

document.getElementById("items").innerHTML = `
<div class="empty-wrapper">
    <div class="empty-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png">
        <h2>Your cart is empty</h2>
        <p>Add items to get started</p>
        <a href="office.html">
            <button class="shop-btn">← Continue Shopping</button>
        </a>
    </div>

    <!-- RECOMMENDED -->
    <div class="recommend">
        <h3>Recommended Products</h3>
        <div class="recommend-grid">
            ${recommended.map((p,i)=>`
            <div class="re-card">
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <p>₹${p.price}</p>
                <button onclick="addToCart('${p.name}',${p.price})">Add</button>
            </div>
            `).join("")}
        </div>
    </div>
</div>
`;

document.getElementById("summary").style.display="none";
return;
}

/* NORMAL CART */
container.classList.remove("empty-mode");
document.getElementById("summary").style.display="block";

let itemsHTML="";
let total=0;

cart.forEach((item,i)=>{
let sub=item.price*item.qty;
total+=sub;

itemsHTML+=`
<div class="item">
<img src="https://via.placeholder.com/80">
<div class="details">
<h4>${item.name}</h4>
<div class="price">₹${item.price}</div>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

<div class="remove" onclick="deleteItem(${i})">Remove</div>
</div>

<div class="price">₹${sub}</div>
</div>
`;
});

document.getElementById("items").innerHTML=itemsHTML;

let gst=Math.round(total*0.18);

document.getElementById("summary").innerHTML=`
<h3>Order Summary</h3>
<p>Subtotal: ₹${total}</p>
<p>GST: ₹${gst}</p>
<h3>Total: ₹${total+gst}</h3>
<button onclick="clearCart()">Clear Cart</button>
`;

}

/* ADD TO CART */
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let found = cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

/* QTY */
function changeQty(i,c){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
cart[i].qty+=c;
if(cart[i].qty<=0) cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

/* DELETE */
function deleteItem(i){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
cart.splice(i,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
loadCart();
}

/* CLEAR */
function clearCart(){
localStorage.removeItem(cartKey);
loadCart();
}

loadCart();

</script>

</body>
</html>
