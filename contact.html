<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - KBM</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #0b3d91, #1e5ed8);
    color: white;
    padding: 20px;
    text-align: center;
}

/* LAYOUT */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    padding: 40px;
}

/* FORM */
.form-box {
    flex: 1;
    background: white;
    padding: 30px;
    border-radius: 10px;
}

.form-box h2 {
    margin-bottom: 20px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 15px;
    background: #2596be;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}

/* CONTACT INFO */
.info {
    flex: 1;
}

.info h3 {
    color: #0b3d91;
}

/* BACK */
a {
    display: inline-block;
    margin: 20px;
    text-decoration: none;
    background: #0b3d91;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Contact Us</h1>
</header>

<div class="container">

    <!-- FORM -->
    <form action="https://formsubmit.co/kbmturnkeyprojects@gmail.com" method="POST">

    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="company" placeholder="Company Name">
    <input type="text" name="country" placeholder="Country">

    <select name="source">
        <option>How did you hear about us?</option>
        <option>Google</option>
        <option>Reference</option>
        <option>Social Media</option>
    </select>

    <textarea name="message" rows="4" placeholder="Requirements"></textarea>

    <!-- Hidden settings -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Enquiry from KBM Website">

    <button type="submit">Send your message</button>

</form>

    <!-- INFO -->
    <div class="info">
        <h3>Contact Details</h3>
        <p>📞 +91 9886887482</p>
        <p>📧 kbmturnkeyprojects@gmail.com</p>
        <p>📍 Bengaluru, India</p>
    </div>

</div>

<a href="index.html">← Back to Home</a>

</body>
</html>
