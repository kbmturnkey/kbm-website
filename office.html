<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supplies</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f7fb;}

.navbar {
display:flex;justify-content:space-between;align-items:center;
padding:15px 40px;background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo img {height:50px;}

.cart a {text-decoration:none;font-weight:bold;}

.page-title {
background:linear-gradient(to right,#1e4db7,#2f6be0);
color:white;text-align:center;padding:15px;font-size:22px;
}

.container {display:flex;padding:20px;gap:20px;}

.filter {
width:260px;background:white;padding:20px;border-radius:12px;
}

.products {flex:1;}

.shop input {
width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card {
background:white;padding:15px;border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img {height:140px;width:100%;object-fit:contain;}

button {
margin-top:10px;padding:8px;border:none;
background:#1e4db7;color:white;border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo"><img src="logo.png"></div>

<div class="cart">
<a href="officecart.html">🛒 <span id="cartCount">0</span></a>
</div>
</header>

<div class="page-title">Office Supplies & Stationery</div>

<div class="container">

<div class="filter">
<h3>Filter</h3>

<select id="category" onchange="loadSub()"></select>

<select id="sub" onchange="renderItems()">
<option>Select</option>
</select>
</div>

<div class="products">
<div class="shop">
<input type="text" id="search" placeholder="Search..." onkeyup="renderItems()">
</div>

<div class="grid" id="grid"></div>
</div>

</div>

<script>

let data = [];
let cart = JSON.parse(localStorage.getItem("officecart")) || [];

/* LOAD JSON */
fetch('./office.json')
.then(res => res.json())
.then(json => {
data = json;
loadCategories();
renderItems();
});

/* CART COUNT */
document.getElementById("cartCount").innerText =
cart.reduce((a,b)=>a+(b.qty||1),0);

/* CATEGORY */
function loadCategories(){
let unique = [...new Set(data.map(d=>d.category))];

category.innerHTML = '<option value="">Select Category</option>';
unique.forEach(cat=>{
category.innerHTML += `<option value="${cat}">${cat}</option>`;
});
}

/* SUBCATEGORY */
function loadSub(){
let filtered = data.filter(d=>d.category===category.value);

let unique = [...new Set(filtered.map(d=>d.subcategory))];

sub.innerHTML = '<option value="">Select</option>';
unique.forEach(s=>{
sub.innerHTML += `<option value="${s}">${s}</option>`;
});

renderItems();
}

/* RENDER */
function renderItems(){

let search = document.getElementById("search").value.toLowerCase();

let filtered = data.filter(d =>
d.name.toLowerCase().includes(search)
);

if(category.value)
filtered = filtered.filter(d=>d.category===category.value);

if(sub.value)
filtered = filtered.filter(d=>d.subcategory===sub.value);

grid.innerHTML="";

filtered.forEach(item=>{

let price = Math.floor(Math.random()*500)+50;
let gst = Math.round(price*0.18);
let total = price + gst;

grid.innerHTML += `
<div class="card">
<img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
<h4>${item.name}</h4>
<p>${item.description}</p>
<p>₹${price} + GST ₹${gst}</p>
<b>Total ₹${total}</b>
<button onclick="addToCart('${item.name}',${total})">Add to Cart</button>
</div>
`;
});
}

/* ADD TO CART */
function addToCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === name);

if(existing){
existing.qty += 1;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("officecart",JSON.stringify(cart));

document.getElementById("cartCount").innerText =
cart.reduce((a,b)=>a+b.qty,0);

alert(name+" added to cart");
}

</script>

</body>
</html>
