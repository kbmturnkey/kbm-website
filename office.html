<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supplies</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eaeded;
}

/* ===== AMAZON HEADER ===== */
.header {
    background: #131921;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ff9900;
}

/* SEARCH BAR */
.search-bar {
    flex: 1;
    display: flex;
}

.search-bar input {
    width: 100%;
    padding: 10px;
    border: none;
}

.search-bar button {
    background: #febd69;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

/* CART */
.cart {
    background: #232f3e;
    padding: 8px 12px;
    border-radius: 6px;
}

/* ===== LAYOUT ===== */
.container {
    display: flex;
}

/* ===== SIDEBAR FILTER ===== */
.sidebar {
    width: 250px;
    background: white;
    padding: 15px;
    height: 100vh;
    overflow-y: auto;
}

.sidebar h4 {
    margin-bottom: 10px;
}

.sidebar select {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
}

/* ===== PRODUCTS ===== */
.products {
    flex: 1;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 20px;
}

/* ===== PRODUCT CARD ===== */
.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    transition: 0.2s;
    position: relative;
}

.card:hover {
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transform: translateY(-3px);
}

.card img {
    height: 150px;
    width: 100%;
    object-fit: contain;
}

/* TITLE */
.card h4 {
    font-size: 15px;
    margin: 10px 0;
}

/* RATING */
.rating {
    color: #ffa41c;
    font-size: 13px;
}

/* PRICE */
.price {
    font-size: 18px;
    font-weight: bold;
}

/* MRP */
.mrp {
    text-decoration: line-through;
    color: #888;
    font-size: 13px;
}

/* DISCOUNT */
.discount {
    color: green;
    font-size: 13px;
}

/* BUTTON */
.card button {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: #ffd814;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.card button:hover {
    background: #f7ca00;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

/* MOBILE */
@media(max-width:768px){
.container {flex-direction:column;}
.sidebar {width:100%;height:auto;}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">KBM Store</div>

<div class="search-bar">
<input type="text" id="search" placeholder="Search products..." onkeyup="renderItems()">
<button>🔍</button>
</div>

<div class="cart">🛒 Cart</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h4>Category</h4>
<select id="category" onchange="loadSub()"></select>

<h4>Sub Category</h4>
<select id="sub" onchange="renderItems()" style="display:none;"></select>

</div>

<!-- PRODUCTS -->
<div class="products">

<div class="topbar">
<div id="count">0 results</div>
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let data=[];
let cartKey="officecart";

/* LOAD DATA */
fetch('./office.json')
.then(res=>res.json())
.then(json=>{
data=json;
loadCategories();
renderItems();
});

/* CATEGORY */
function loadCategories(){
let unique=[...new Set(data.map(d=>d.category))];

category.innerHTML='<option value="">All</option>';

unique.forEach(c=>{
category.innerHTML+=`<option>${c}</option>`;
});
}

/* SUBCATEGORY */
function loadSub(){

let cat=category.value;

if(!cat){
sub.style.display="none";
renderItems();
return;
}

sub.style.display="block";

let filtered=data.filter(d=>d.category===cat);
let unique=[...new Set(filtered.map(d=>d.subcategory))];

sub.innerHTML='<option value="">All</option>';

unique.forEach(s=>{
sub.innerHTML+=`<option>${s}</option>`;
});

renderItems();
}

/* RENDER */
function renderItems(){

let search=document.getElementById("search").value.toLowerCase();

let filtered=data;

if(search){
filtered=filtered.filter(d=>d.name.toLowerCase().includes(search));
}

if(category.value){
filtered=filtered.filter(d=>d.category===category.value);
}

if(sub.value){
filtered=filtered.filter(d=>d.subcategory===sub.value);
}

document.getElementById("count").innerText=filtered.length+" results";

grid.innerHTML="";

filtered.forEach(item=>{

let price=Math.floor(Math.random()*500)+100;
let mrp=price+Math.floor(Math.random()*100);
let discount=Math.round(((mrp-price)/mrp)*100);

grid.innerHTML+=`
<div class="card">

<img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">

<h4>${item.name}</h4>

<div class="rating">⭐⭐⭐⭐☆ (120)</div>

<div class="price">₹${price}</div>
<div class="mrp">₹${mrp}</div>
<div class="discount">${discount}% off</div>

<button onclick="addToCart('${item.name}',${price})">Add to Cart</button>

</div>
`;
});
}

/* CART */
function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
let f=cart.find(i=>i.name===name);

if(f) f.qty++;
else cart.push({name,price,qty:1});

localStorage.setItem(cartKey,JSON.stringify(cart));
alert("Added to cart");
}

</script>

</body>
</html>
