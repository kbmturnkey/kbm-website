<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supplies</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dde4ee);
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 40px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;font-weight:500;}

.right-section {display:flex;align-items:center;gap:20px;}

.cart {
    position:relative;
    background:#f1f3f7;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

#cartCount {
    background:red;color:white;border-radius:50%;
    padding:3px 7px;font-size:12px;
    position:absolute;top:-8px;right:-8px;
}

.contact-btn {
    background:#6c8f2e;color:white;
    padding:10px 16px;border-radius:6px;
}

/* ===== TITLE ===== */
.page-title {
    background:linear-gradient(to right,#1e4db7,#2f6be0);
    color:white;text-align:center;
    padding:15px;font-size:22px;
}

/* ===== LAYOUT ===== */
.container {
    display:flex;
    padding:20px;
    gap:20px;
}

/* ===== ULTRA FILTER ===== */
.filter {
    width:260px;
    padding:20px;
    border-radius:16px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
}

.filter:hover {
    transform: translateY(-3px);
}

.filter h3 {
    margin-top:0;
}

/* SELECT */
.filter select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    transition:0.3s;
}

.filter select:focus {
    border-color:#2874f0;
    box-shadow:0 0 6px rgba(40,116,240,0.2);
}

/* ===== PRODUCTS ===== */
.products {flex:1;}

/* HEADER */
.shop {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* SEARCH */
.search-box {
    position: relative;
    width: 260px;
}

.search-box input {
    width:100%;
    padding:10px 35px 10px 12px;
    border-radius:20px;
    border:1px solid #ddd;
    outline:none;
}

.search-icon {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    height:140px;
    object-fit:contain;
}

.desc {
    font-size:13px;
    color:#666;
    min-height:40px;
}

.price {
    color:#1e4db7;
    font-weight:bold;
    margin-top:5px;
}

button {
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#1e4db7;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.container {flex-direction:column;}
.filter {width:100%;}
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo"><img src="logo.png"></div>

<nav class="menu">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="contact.html">Contact</a>
</nav>

<div class="right-section">
<a href="officecart.html" class="cart">
🛒 Cart <span id="cartCount">0</span>
</a>
<div class="contact-btn">📞 +91 9886887482</div>
</div>
</header>

<div class="page-title">Office Supplies & Stationery</div>

<div class="container">

<!-- FILTER -->
<div class="filter">
<h3>Filter</h3>

<select id="category" onchange="loadSub()"></select>

<select id="sub" onchange="renderItems()" style="display:none;"></select>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="shop">
<div id="count">0 Items</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search..." onkeyup="renderItems()">
<span class="search-icon">🔍</span>
</div>
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let data=[];
let cartKey="officecart";

/* LOAD JSON */
fetch('./office.json')
.then(res=>res.json())
.then(json=>{
data=json;
loadCategories();
renderItems();
updateCartCount();
});

/* CART COUNT */
function updateCartCount(){
let cart=JSON.parse(localStorage.getItem(cartKey))||[];
let count=cart.reduce((a,b)=>a+(b.qty||1),0);
document.getElementById("cartCount").innerText=count;
}

/* CATEGORY */
function loadCategories(){
let unique=[...new Set(data.map(d=>d.category))];

category.innerHTML='<option value="">Select Category</option>';

unique.forEach(cat=>{
category.innerHTML+=`<option>${cat}</option>`;
});
}

/* SUBCATEGORY */
function loadSub(){

let cat=category.value;
let sub=document.getElementById("sub");

if(!cat){
sub.style.display="none";
sub.innerHTML="";
renderItems();
return;
}

sub.style.display="block";

let filtered=data.filter(d=>d.category===cat);
let unique=[...new Set(filtered.map(d=>d.subcategory))];

sub.innerHTML='<option value="">Select Sub Category</option>';

unique.forEach(s=>{
sub.innerHTML+=`<option>${s}</option>`;
});

renderItems();
}

/* RENDER */
function renderItems(){

let search=document.getElementById("search").value.toLowerCase();

let filtered=data;

if(search){
filtered=filtered.filter(d=>d.name.toLowerCase().includes(search));
}

if(category.value){
filtered=filtered.filter(d=>d.category===category.value);
}

if(sub.value){
filtered=filtered.filter(d=>d.subcategory===sub.value);
}

document.getElementById("count").innerText=filtered.length+" Items";

grid.innerHTML="";

if(filtered.length===0){
grid.innerHTML="<p>No items found</p>";
return;
}

filtered.forEach(item=>{

let price=Math.floor(Math.random()*500)+50;

grid.innerHTML+=`
<div class="card">
<img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
<h4>${item.name}</h4>
<p class="desc">${item.description || ""}</p>
<p class="price">₹${price}</p>
<button onclick="addToCart('${item.name}',${price})">Add to Cart</button>
</div>
`;
});
}

/* ADD CART */
function addToCart(name,price){

let cart=JSON.parse(localStorage.getItem(cartKey))||[];

let existing=cart.find(i=>i.name===name);

if(existing){existing.qty++;}
else{cart.push({name,price,qty:1});}

localStorage.setItem(cartKey,JSON.stringify(cart));
updateCartCount();
}

</script>

</body>
</html>
