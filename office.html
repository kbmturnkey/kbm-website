<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supplies</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 40px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.logo img {height:55px;}

.menu {display:flex;gap:30px;}
.menu a {text-decoration:none;color:#333;font-weight:500;}

.right-section {display:flex;align-items:center;gap:20px;}

.cart {
    position:relative;
    background:#f1f3f7;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

#cartCount {
    background:red;color:white;border-radius:50%;
    padding:3px 7px;font-size:12px;
    position:absolute;top:-8px;right:-8px;
}

.contact-btn {
    background:#6c8f2e;color:white;
    padding:10px 16px;border-radius:6px;
}

/* TITLE */
.page-title {
    background:linear-gradient(to right,#1e4db7,#2f6be0);
    color:white;text-align:center;
    padding:15px;font-size:22px;
}

/* LAYOUT */
.container {display:flex;padding:20px;gap:20px;}

/* ===== PREMIUM FILTER ===== */
.filter {
    width:260px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.filter h3 {
    margin-bottom:10px;
}

/* LABEL */
.filter label {
    font-size:13px;
    color:#666;
    margin-top:12px;
    display:block;
}

/* SELECT */
.filter select {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ddd;
    transition:0.2s;
}

.filter select:focus {
    border-color:#1e4db7;
    outline:none;
}

/* PRODUCTS */
.products {flex:1;}

/* ===== SHOP HEADER ===== */
.shop {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

/* LEFT COUNT */
.item-count {
    font-weight:600;
    color:#333;
}

/* RIGHT SEARCH */
.search-box {
    position:relative;
}

.search-box input {
    width:220px;
    padding:8px 30px 8px 10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.search-box span {
    position:absolute;
    right:8px;
    top:6px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));

    column-gap: 20px;  /* left-right */
    row-gap: 30px;     /* 🔥 top-bottom spacing */
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
    transition:0.3s;

    display: flex;
    flex-direction: column;
    justify-content: space-between;  /* 🔥 key */
    height: 100%;                    /* 🔥 equal height */
}

.card:hover {transform:translateY(-5px);}

.card img {
    height:140px;width:100%;
    object-fit:contain;
}

.price {color:#1e4db7;font-weight:bold;}
.total {color:green;}

button {
    margin-top:10px;
    padding:8px;
    border:none;
    background:#1e4db7;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* EMPTY */
.empty {
    text-align:center;
    padding:40px;
    color:#888;
}

.card-top {
    flex-grow: 1;
}

/* DESCRIPTION */
.desc {
    font-size: 13px;
    color: #666;
    min-height: 40px; /* 🔥 keeps alignment */
}

/* BOTTOM FIXED */
.card-bottom {
    margin-top: auto;
}

/* PRICE */
.price {
    color: #1e4db7;
    font-weight: bold;
    margin: 5px 0;
}

/* TOTAL */
.total {
    color: green;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo"><img src="logo.png"></div>

<nav class="menu">
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="contact.html">Contact</a>
</nav>

<div class="right-section">
<a href="officecart.html" class="cart">
🛒 Cart <span id="cartCount">0</span>
</a>
<div class="contact-btn">📞 +91 9886887482</div>
</div>
</header>

<div class="page-title">Office Supplies & Stationery</div>

<div class="container">

<!-- FILTER -->
<div class="filter">
<h3>Filter</h3>

<label>Category</label>
<select id="category" onchange="loadSub()"></select>

<label>Sub Category</label>
<select id="sub" onchange="renderItems()">
<option value="">Select Sub Category</option>
</select>
</div>

<!-- PRODUCTS -->
<div class="products">

<!-- HEADER -->
<div class="shop">

<!-- LEFT -->
<div class="item-count" id="count">0 Items</div>

<!-- RIGHT -->
<div class="search-box">
<input type="text" id="search" placeholder="Search..." onkeyup="renderItems()">
<span>🔍</span>
</div>

</div>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let data = [];
let cartKey = "officecart";

/* LOAD */
fetch('./office.json')
.then(res=>res.json())
.then(json=>{
data=json;
loadCategories();
renderItems();
updateCartCount();
});

/* CART COUNT */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let count = cart.reduce((a,b)=>a+(b.qty||1),0);
document.getElementById("cartCount").innerText = count;
}

/* CATEGORY */
function loadCategories(){
let unique = [...new Set(data.map(d=>d.category))];
category.innerHTML='<option value="">Select Category</option>';

unique.forEach(cat=>{
category.innerHTML+=`<option value="${cat}">${cat}</option>`;
});
}

/* SUB CATEGORY BELOW */
function loadSub(){

let filtered = data.filter(d=>d.category===category.value);

let unique = [...new Set(filtered.map(d=>d.subcategory))];

sub.innerHTML='<option value="">Select Sub Category</option>';

unique.forEach(s=>{
sub.innerHTML+=`<option value="${s}">${s}</option>`;
});

renderItems();
}

/* RENDER */
function renderItems(){

let search = document.getElementById("search").value.toLowerCase();

let filtered = data;

if(search){
filtered = filtered.filter(d=>d.name.toLowerCase().includes(search));
}

if(category.value){
filtered = filtered.filter(d=>d.category===category.value);
}

if(sub.value){
filtered = filtered.filter(d=>d.subcategory===sub.value);
}

/* LEFT COUNT */
document.getElementById("count").innerText = filtered.length + " Items";

grid.innerHTML="";

if(filtered.length === 0){
grid.innerHTML = "<div class='empty'>No products found</div>";
return;
}

filtered.forEach(item=>{

let price = Math.floor(Math.random()*500)+50;
let gst = Math.round(price*0.18);
let total = price + gst;

grid.innerHTML+=`
<div class="card">

    <div class="card-top">
        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
        <h4>${item.name}</h4>
        <p class="desc">${item.description}</p>
    </div>

    <div class="card-bottom">
        <p class="price">₹${price}</p>
        <p class="total">Total ₹${total}</p>
        <button onclick="addToCart('${item.name}',${total})">Add to Cart</button>
    </div>
`;
});
}

/* ADD CART */
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let existing = cart.find(i=>i.name===name);

if(existing){existing.qty+=1;}
else{cart.push({name,price,qty:1});}

localStorage.setItem(cartKey,JSON.stringify(cart));
updateCartCount();
}

</script>

</body>
</html>
