<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  color: #fff;
  animation: fadeIn 1s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 5px;
}

.toggle {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #00c6ff;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0072ff;
}

.error {
  color: #ff6b6b;
  font-size: 14px;
  margin-bottom: 10px;
  text-align: center;
}

.links {
  margin-top: 15px;
  text-align: center;
}

.links a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>Welcome Back</h2>

  <div class="error" id="errorMsg"></div>

  <form onsubmit="loginUser(event)">
    
    <div class="input-box">
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="links">
    <a href="/kbm-website/pages/register.html">Create Account</a><br>
    <a href="/kbm-website/index.html">Home</a>
  </div>
</div>

<script>
// Auto redirect if already logged in
if (localStorage.getItem("loggedInUser")) {
  window.location.href = "/kbm-website/index.html";
}

// Toggle Password
function togglePassword() {
  const pwd = document.getElementById("password");
  pwd.type = pwd.type === "password" ? "text" : "password";
}

// Login Function
function loginUser(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");

  const users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    // Save session
    localStorage.setItem("loggedInUser", JSON.stringify(user));

    // Redirect
    if (email === "admin@gmail.com") {
      window.location.href = "/kbm-website/pages/admin.html";
    } else {
      window.location.href = "/kbm-website/index.html";
    }

  } else {
    errorMsg.textContent = "Invalid email or password!";
  }
}
</script>

</body>
</html>
