<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBM Turnkey Projects</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #fff;
}

nav {
    display: flex;
    gap: 20px;
    align-items: center;
}

nav a {
    text-decoration: none;
    color: #333;
}

/* LOGIN BUTTON */
.login-btn {
    background: linear-gradient(135deg,#1e73be,#155a96);
    color: white !important;
    padding: 10px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    width: 350px;
    margin: 8% auto;
    padding: 25px;
    border-radius: 12px;
    animation: popup 0.3s ease;
}

@keyframes popup {
    from {transform: scale(0.8); opacity:0;}
    to {transform: scale(1); opacity:1;}
}

.close {
    float: right;
    cursor: pointer;
}

/* FORM */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #1e73be;
    color: white;
    border: none;
}

.password-box {
    display: flex;
}

.password-box span {
    margin-left: -30px;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="header">
    <h2>KBM</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>

        <!-- LOGIN BUTTON -->
        <a href="#" class="login-btn" onclick="openLogin()">👤 Login</a>
    </nav>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeLogin()">❌</span>

    <h2>Login</h2>

    <form onsubmit="loginUser(event)">
      <input type="email" id="email" placeholder="Email" required>

      <div class="password-box">
        <input type="password" id="password" placeholder="Password" required>
        <span onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">Login</button>
    </form>

  </div>
</div>

<script>
function openLogin() {
    document.getElementById("loginModal").style.display = "block";
}

function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

window.onclick = function(e) {
    const modal = document.getElementById("loginModal");
    if (e.target === modal) {
        modal.style.display = "none";
    }
}

function togglePassword() {
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}

function loginUser(e) {
    e.preventDefault();
    alert("Login working!");
}
</script>

</body>
</html>
